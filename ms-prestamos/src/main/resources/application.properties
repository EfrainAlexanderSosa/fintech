server.port=8084

# DataSource MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fintech_prestamos?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.application.name=ms-prestamos

# ★ URLs de microservicios consultados via FeignClient ★
feign.client.ms-usuarios.url=http://localhost:8081
feign.client.ms-cuentas.url=http://localhost:8082

# Timeout FeignClient
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000
